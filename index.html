<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NAKAMA: BATTLE PROWESS — System Reference Document</title>
    <meta
        name="description"
        content="NAKAMA SRD"
    >
    <meta property="og:title" content="NAKAMA: BATTLE PROWESS">
    <meta
        property="og:description"
        content="A tactical TTRPG with slice of life elements inspired by battle shounen anime."
    >
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/og-nakama-srd.svg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        :root {
            color-scheme: dark;

            --font-heading: "Montserrat", "Arial", sans-serif;
            --font-body: "Inter", "Arial", sans-serif;

            --space-1: 8px;
            --space-2: 16px;
            --space-3: 24px;
            --space-4: 32px;
            --space-5: 40px;
            --space-8: 64px;

            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;

            --content-max: 1200px;
            --measure: 760px;
            --sidebar: 256px;
            --toc: 256px;
            --header-height: 72px;
            --navigation-width: var(--sidebar);
            --header-gutter: var(--space-5);
            --header-gap: var(--space-5);
            --header-compact-gutter: var(--space-3);
            --header-mobile-gutter: var(--space-2);
            --controlpanel-width: calc(var(--sidebar) + var(--space-8) + var(--space-5));
            --search-results-width: 640px;
            --search-results-height: 480px;
            --search-results-mobile-height: 384px;

            --duration-fast: 200ms;
            --duration-panel: 400ms;
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);

            --accent: #ff3e00;
            --accent-hover: #e63500;
            --on-accent: #fff;

            --shadow-level-2:
                0 4px 6px -1px rgba(0, 0, 0, 0.1),
                0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-level-3:
                0 16px 32px rgba(0, 0, 0, 0.15);
        }

        :root[data-theme="dark"] {
            color-scheme: dark;

            --background: #10131a;
            --surface: #141820;
            --surface-low: #191c22;
            --surface-mid: #1f242d;
            --surface-high: #2a303b;
            --border: #3a3f49;
            --border-strong: #515865;
            --text: #f3f4f6;
            --text-muted: #c4c8d0;
            --text-subtle: #8f96a3;
            --secondary: #cbd5e1;
            --secondary-bg: #232a35;
            --warning: #f59e0b;
            --danger: #ffb4ab;
            --inset: #0b0e14;
        }

        :root[data-theme="light"] {
            color-scheme: light;

            --background: #f8fafc;
            --surface: #fff;
            --surface-low: #f2f4f6;
            --surface-mid: #eceef0;
            --surface-high: #e6e8ea;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text: #191c1e;
            --text-muted: #475569;
            --text-subtle: #64748b;
            --secondary: #1a1a1a;
            --secondary-bg: #e2e8f0;
            --warning: #b45309;
            --danger: #ba1a1a;
            --inset: #fff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            min-width: 320px;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text);
            background-color: var(--background);
        }

        body.is-controlpanel-open {
            --navigation-width: var(--controlpanel-width);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        svg {
            display: block;
            flex-shrink: 0;
        }

        .skiplink {
            position: fixed;
            top: var(--space-2);
            left: var(--space-2);
            z-index: 100;
            padding: var(--space-1) var(--space-2);
            font-size: 14px;
            font-weight: 700;
            color: var(--on-accent);
            background-color: var(--accent);
            border-radius: var(--radius-sm);
            transform: translateY(-200%);
            transition:
                transform var(--duration-fast) var(--ease-standard),
                background-color var(--duration-fast) var(--ease-standard);
        }

        .skiplink:focus {
            transform: translateY(0);
        }

        .app {
            display: grid;
            min-height: 100vh;
            grid-template-rows: auto 1fr auto;
        }

        .siteheader {
            position: sticky;
            top: 0;
            z-index: 40;
            display: grid;
            grid-template-areas: "brand . search . actions";
            grid-template-columns:
                var(--navigation-width)
                minmax(var(--space-3), 1fr)
                minmax(0, var(--measure))
                minmax(var(--space-3), var(--header-gap))
                max-content;
            align-items: center;
            min-height: var(--header-height);
            padding: 0 var(--header-gutter) 0 0;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            transition:
                grid-template-columns var(--duration-panel) var(--ease-standard),
                padding var(--duration-panel) var(--ease-standard);
        }

        .siteheader-main,
        .siteheader-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            min-width: 0;
            min-height: var(--header-height);
        }

        .siteheader-main {
            grid-area: brand;
            padding: var(--space-2);
        }

        .siteheader-actions {
            grid-area: actions;
            justify-content: flex-end;
            justify-self: end;
            min-width: max-content;
            padding-right: 0;
        }

        .siteheader-actions .btn {
            white-space: nowrap;
        }

        .siteheader-menu {
            display: inline-flex;
        }

        .siteheader-brand {
            display: flex;
            align-items: baseline;
            gap: var(--space-2);
            min-width: 0;
        }

        .siteheader-mark {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 800;
            line-height: 1.3333;
            letter-spacing: -0.01em;
            color: var(--accent);
            white-space: nowrap;
        }

        .siteheader-version {
            display: none;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3333;
            letter-spacing: 0.04em;
            color: var(--text-subtle);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .sitesearch {
            position: relative;
            grid-area: search;
            justify-self: stretch;
            min-width: 0;
            width: 100%;
        }

        .sitesearch-label {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            clip-path: inset(50%);
            white-space: nowrap;
        }

        .sitesearch-input {
            width: 100%;
            min-width: 0;
            min-height: 40px;
            padding: var(--space-1) var(--space-2);
            color: var(--text);
            background-color: var(--surface-low);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition:
                border-color var(--duration-fast) var(--ease-standard),
                box-shadow var(--duration-fast) var(--ease-standard);
        }

        .sitesearch-input:focus {
            border-color: var(--accent);
            outline: 0;
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 24%, transparent);
        }

        .sitesearch-input:disabled {
            color: var(--text-subtle);
            cursor: wait;
        }

        .searchresults {
            position: absolute;
            top: calc(100% + var(--space-1));
            right: 0;
            z-index: 80;
            display: grid;
            gap: var(--space-2);
            width: min(var(--search-results-width), calc(100vw - var(--space-4)));
            max-height: var(--search-results-height);
            padding: var(--space-2);
            overflow-y: auto;
            background-color: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-level-3);
        }

        .searchresults[hidden] {
            display: none;
        }

        .searchgroup {
            display: grid;
            gap: var(--space-1);
        }

        .searchgroup-title {
            margin: 0;
            padding: 0 var(--space-1);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.3333;
            letter-spacing: 0.08em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .searchresult-list {
            display: grid;
            gap: var(--space-1);
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .searchresult {
            display: grid;
            gap: var(--space-1);
            padding: var(--space-2);
            background-color: var(--surface-low);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition:
                background-color var(--duration-fast) var(--ease-standard),
                border-color var(--duration-fast) var(--ease-standard);
        }

        .searchresult:hover,
        .searchresult:focus-visible {
            background-color: var(--surface-mid);
            border-color: var(--border-strong);
            outline: 0;
        }

        .searchresult-title {
            font-size: 14px;
            font-weight: 800;
            line-height: 1.4286;
            color: var(--text);
        }

        .searchresult-section {
            font-size: 12px;
            font-weight: 700;
            line-height: 1.3333;
            color: var(--text-subtle);
        }

        .searchresult-snippet {
            font-size: 13px;
            line-height: 1.3846;
            color: var(--text-muted);
        }

        .searchresults-empty {
            margin: 0;
            padding: var(--space-2);
            font-size: 14px;
            line-height: 1.4286;
            color: var(--text-muted);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-1);
            min-height: 40px;
            padding: var(--space-1) var(--space-2);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4286;
            color: var(--text);
            background-color: var(--surface-low);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition:
                color var(--duration-fast) var(--ease-standard),
                background-color var(--duration-fast) var(--ease-standard),
                border-color var(--duration-fast) var(--ease-standard),
                box-shadow var(--duration-fast) var(--ease-standard);
        }

        .btn:hover {
            background-color: var(--surface-mid);
            border-color: var(--border-strong);
        }

        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-primary {
            color: var(--on-accent);
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-secondary {
            color: var(--background);
            background-color: var(--secondary);
            border-color: var(--secondary);
        }

        .btn-secondary:hover {
            color: var(--background);
            background-color: var(--text);
            border-color: var(--text);
        }

        .btn-outline {
            color: var(--text);
            background-color: transparent;
            border-color: var(--border-strong);
        }

        .btn-icon {
            width: 40px;
            padding: var(--space-1);
        }

        .btn.is-loading {
            color: transparent;
            pointer-events: none;
            position: relative;
        }

        .btn.is-loading::after {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid currentcolor;
            border-right-color: transparent;
            border-radius: 50%;
            content: "";
            color: var(--on-accent);
            animation: spin 800ms linear infinite;
        }

        .appbody {
            display: grid;
            grid-template-columns: var(--navigation-width) minmax(0, 1fr);
            transition: grid-template-columns var(--duration-panel) var(--ease-standard);
        }

        .sidenav {
            position: sticky;
            top: var(--header-height);
            height: calc(100vh - var(--header-height));
            padding: var(--space-4) var(--space-2);
            overflow-y: auto;
            background-color: var(--surface-low);
            border-right: 1px solid var(--border);
        }

        .sidenav-header {
            margin: 0 0 var(--space-4);
            padding: 0 var(--space-1);
        }

        .sidenav-kicker {
            margin: 0;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.3333;
            letter-spacing: 0.08em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .sidenav-title {
            margin: var(--space-1) 0 0;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4286;
            color: var(--text-muted);
        }

        .sidenav-sections {
            display: grid;
            gap: var(--space-3);
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .sidenav-section {
            display: grid;
            gap: var(--space-1);
        }

        .sidenav-sectiontitle {
            margin: 0;
            padding: 0 var(--space-1);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.3333;
            letter-spacing: 0.08em;
            color: var(--text-subtle);
            text-transform: uppercase;
        }

        .sidenav-list {
            display: grid;
            gap: var(--space-1);
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .sidenav-link {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            width: 100%;
            min-height: 40px;
            padding: var(--space-1) var(--space-2);
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4286;
            color: var(--text-muted);
            text-align: left;
            background-color: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            transition:
                color var(--duration-fast) var(--ease-standard),
                background-color var(--duration-fast) var(--ease-standard),
                border-color var(--duration-fast) var(--ease-standard);
        }

        .sidenav-link:hover {
            color: var(--text);
            background-color: var(--surface-mid);
        }

        .sidenav-link:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .sidenav-link.is-active {
            color: var(--on-accent);
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .sidenav-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .main {
            min-width: 0;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, var(--measure)) var(--toc);
            gap: var(--space-5);
            width: min(100%, var(--content-max));
            margin: 0 auto;
            padding: var(--space-5);
        }

        .doc {
            min-width: 0;
        }

		.doc a {
			color: #2563eb;
			text-decoration: underline;
			text-underline-offset: 2px;
		}

		.doc a:hover,
		.doc a:focus-visible {
			color: #1d4ed8;
		}

        .doc-header {
            margin: 0 0 var(--space-4);
            padding: 0 0 var(--space-3);
            border-bottom: 1px solid var(--border-strong);
        }

        .doc-kicker {
            margin: 0 0 var(--space-1);
            font-size: 14px;
            font-weight: 800;
            line-height: 1.4286;
            letter-spacing: 0.08em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .doc-title {
            margin: 0;
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .doc-description {
            margin: var(--space-2) 0 0;
            max-width: 640px;
            font-size: 18px;
            line-height: 1.5556;
            color: var(--text-muted);
        }

        .doc-body {
            display: grid;
            gap: var(--space-4);
        }

		.doc-body h1,
		.doc-body h2,
		.doc-body h3,
		.doc-body h4 {
			margin: 0;
			font-family: var(--font-heading);
			color: var(--text);
		}

        .doc-body h1 {
            display: none;
        }

        .doc-body h2 {
            padding: var(--space-4) 0 var(--space-1);
            font-size: 24px;
            font-weight: 800;
            line-height: 1.3333;
            border-bottom: 1px solid var(--border-strong);
        }

        .doc-body h3 {
            font-size: 20px;
            font-weight: 800;
            line-height: 1.4;
        }
		
		.doc-body h4 {
			font-size: 16px;
			font-weight: 800;
			line-height: 1.5;
			letter-spacing: 0.02em;
		}

        .doc-body p,
        .doc-body ul,
        .doc-body ol {
            margin: 0;
            color: var(--text-muted);
        }

        .doc-body p {
            font-size: 16px;
            line-height: 1.5;
        }

        .doc-body ul,
        .doc-body ol {
            display: grid;
            gap: var(--space-1);
            padding-left: var(--space-3);
        }

        .doc-body code {
            padding: 2px 4px;
            font-size: 0.875em;
            color: var(--text);
            background-color: var(--surface-mid);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .doc-body strong {
            font-weight: 700;
            color: var(--text);
        }

        .markdown-table-wrap {
            width: 100%;
            overflow-x: auto;
            background-color: var(--surface-low);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .markdown-table {
            width: 100%;
            min-width: 640px;
            border-collapse: collapse;
            font-size: 14px;
            line-height: 1.4286;
        }

        .markdown-table th,
        .markdown-table td {
            padding: var(--space-1) var(--space-2);
            vertical-align: top;
            border-bottom: 1px solid var(--border);
        }

        .markdown-table th {
            font-weight: 800;
            color: var(--text);
            text-align: left;
            background-color: var(--surface-mid);
        }

        .markdown-table td {
            color: var(--text-muted);
        }

        .markdown-table tr:last-child td {
            border-bottom: 0;
        }

        .markdown-table .markdown-table-cell-center {
            text-align: center;
        }

        .markdown-table .markdown-table-cell-right {
            text-align: right;
        }

        .highlight {
            display: grid;
            gap: var(--space-2);
            padding: var(--space-3);
            background-color: var(--surface-mid);
            border: 1px solid var(--border);
            border-left: var(--space-1) solid var(--accent);
            border-radius: var(--radius-md);
        }

        .highlight-header {
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .highlight-title {
            margin: 0;
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 800;
            line-height: 1.4;
            letter-spacing: 0.02em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .highlight-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .highlight p {
            color: var(--text);
        }

        .highlight-archive {
            background-color: var(--surface-low);
            border-style: dashed;
            border-left-color: var(--secondary);
        }

        .highlight-archive .highlight-title,
        .highlight-archive .highlight-icon {
            color: var(--secondary);
        }

        .highlight-note {
            border-left-color: var(--text-subtle);
        }

        .highlight-note .highlight-title,
        .highlight-note .highlight-icon {
            color: var(--text-muted);
        }

        .power {
            overflow: hidden;
            background-color: var(--surface-low);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition:
                border-color var(--duration-fast) var(--ease-standard),
                box-shadow var(--duration-fast) var(--ease-standard);
        }

        .power:hover {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-level-2);
        }

        .power-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-3);
            padding: var(--space-3);
            background-color: var(--surface-mid);
            border-top: 4px solid var(--secondary);
            border-bottom: 1px solid var(--border);
        }

        .power-meta {
            margin: 0 0 var(--space-1);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.3333;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .power-title {
            margin: 0;
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 800;
            line-height: 1.3333;
            letter-spacing: -0.01em;
            color: var(--text);
            text-transform: uppercase;
        }

        .power-cost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 96px;
            min-height: 64px;
            padding: var(--space-1) var(--space-2);
            font-family: var(--font-heading);
            font-size: 40px;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            background-color: var(--inset);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .power-body {
            display: grid;
            gap: var(--space-3);

                sections: Array.isArray(manifest.sections) ? manifest.sections : [],

        function getOrganizedSections() {

                        ? section.documents
                            .map((docId) => documents.find((doc) => doc.id === docId))

                        .filter((doc) => doc.sectionId === section.id)

        async function fetchMarkdown(path) {

        function parseMarkdown(markdown) {
            const { meta, body } = splitFrontMatter(markdown);
            const lines = body.split(/\r?\n/);
            const html = [];
            const toc = [];
            let index = 0;

            while (index < lines.length) {
                const line = lines[index];

                if (!line.trim()) {
                    index += 1;
                    continue;
                }

                if (line.startsWith(":::")) {
                    const block = collectBlock(lines, index);
                    html.push(renderBlock(block.type, block.attrs, block.content));
                    index = block.nextIndex;
                    continue;
                }

                if (line.startsWith("#")) {
                    const heading = parseHeading(line);
                    const id = createSlug(heading.text);

                    if (heading.level > 1) {
                        toc.push({
                            id,
                            level: heading.level,
                            text: heading.text
                        });
                    }

                    html.push(
                        `<h${heading.level} id="${id}">${renderInline(heading.text)}</h${heading.level}>`
                    );
                    index += 1;
                    continue;
                }

                if (line.startsWith("- ")) {
                    const list = collectList(lines, index);
                    html.push(renderList(list.items));
                    index = list.nextIndex;
                    continue;
                }

                if (isTableStart(lines, index)) {
                    const table = collectTable(lines, index);
                    html.push(renderTable(table));
                    index = table.nextIndex;
                    continue;
                }

                const paragraph = collectParagraph(lines, index);
                html.push(`<p>${renderInline(paragraph.text)}</p>`);
                index = paragraph.nextIndex;
            }

            return {
                html: html.join(""),
                meta,
                toc
            };
        }

        function splitFrontMatter(markdown) {
            if (!markdown.startsWith("---")) {
                return {
                    meta: {},
                    body: markdown
                };
            }

            const end = markdown.indexOf("\n---", 3);

            if (end === -1) {
                return {
                    meta: {},
                    body: markdown
                };
            }

            const rawMeta = markdown.slice(3, end).trim();
            const body = markdown.slice(end + 4).trim();
            const meta = {};

            rawMeta.split(/\r?\n/).forEach((line) => {
                const parts = line.split(":");
                const key = parts.shift().trim();

                if (key) {
                    meta[key] = parts.join(":").trim();
                }
            });

            return {
                meta,
                body
            };
        }

        function collectBlock(lines, startIndex) {
            const opening = lines[startIndex].trim();
            const match = opening.match(/^:::(\w+)\s*(.*)$/);
            const type = match ? match[1] : "note";
            const attrs = parseAttributes(match ? match[2] : "");
            const content = [];
            let index = startIndex + 1;

            while (index < lines.length && lines[index].trim() !== ":::") {
                content.push(lines[index]);
                index += 1;
            }

            return {
                attrs,
                content: content.join("\n").trim(),
                nextIndex: index + 1,
                type
            };
        }

        function collectParagraph(lines, startIndex) {
            const content = [];
            let index = startIndex;

            while (
                index < lines.length &&
                lines[index].trim() &&
                !lines[index].startsWith("#") &&
                !lines[index].startsWith("- ") &&
                !lines[index].startsWith(":::") &&
                !isTableStart(lines, index)
            ) {
                content.push(lines[index].trim());
                index += 1;
            }

            return {
                nextIndex: index,
                text: content.join(" ")
            };
        }

        function collectList(lines, startIndex) {
            const items = [];
            let index = startIndex;

            while (index < lines.length && lines[index].startsWith("- ")) {
                items.push(lines[index].slice(2).trim());
                index += 1;
            }

            return {
                items,
                nextIndex: index
            };
        }

        function collectTable(lines, startIndex) {
            const headers = splitTableRow(lines[startIndex]);
            const alignments = splitTableRow(lines[startIndex + 1]).map(getTableAlignment);
            const rows = [];
            let index = startIndex + 2;

            while (index < lines.length && isTableRow(lines[index])) {
                rows.push(splitTableRow(lines[index]));
                index += 1;
            }

            return {
                alignments,
                headers,
                nextIndex: index,
                rows
            };
        }

        function isTableStart(lines, index) {
            const header = lines[index] || "";
            const separator = lines[index + 1] || "";
            const headerCells = splitTableRow(header);

            return isTableRow(header) &&
                isTableSeparator(separator, headerCells.length);

        function isTableRow(line) {
            return line.trim().includes("|");

        function isTableSeparator(line, columnCount) {
            const cells = splitTableRow(line);

            return cells.length === columnCount &&

        function splitTableRow(line) {
            const value = line.trim().replace(/^\|/, "").replace(/\|$/, "");
            const cells = [];
            let cell = "";
            let escaped = false;
            let inCode = false;

            Array.from(value).forEach((character, characterIndex) => {
                if (escaped) {
                    cell += character;
                    escaped = false;
                    return;
                }

                if (character === "\\" && value[characterIndex + 1] === "|") {
                    escaped = true;
                    return;
                }

                if (character === "`") {
                    inCode = !inCode;
                    cell += character;
                    return;
                }

                if (character === "|" && !inCode) {
                    cells.push(cell.trim());
                    cell = "";
                    return;
                }

                cell += character;
            });

            cells.push(cell.trim());

            return cells;
        }

        function getTableAlignment(separator) {
            const value = separator.trim();

            if (value.startsWith(":") && value.endsWith(":")) {
                return "center";
            }

            if (value.endsWith(":")) {
                return "right";
            }

            return "left";
        }

		function parseHeading(line) {

                match = pattern.exec(raw);
            }

            return attrs;
        }

        function renderDocument(parsed, doc) {

            return `<header class="doc-header">
                <p class="doc-kicker">${escapeHtml(section)}</p>
                <h1 class="doc-title">${escapeHtml(title)}</h1>
                ${description ? `<p class="doc-description">${escapeHtml(description)}</p>` : ""}
            </header>

        function renderPower(attrs, content) {

                        value: tier.trim()

                .filter((tier) => tier.value);

        function renderHitTier(tier, index, isBasicTier = false) {

            return `<div class="tier">
                <span class="tier-value">${escapeHtml(tier)}</span>
                <span class="tier-label">${label}</span>

        }

        function renderList(items) {
            return `<ul>${items.map((item) => `<li>${renderInline(item)}</li>`).join("")}</ul>`;
        }

        function renderTable(table) {
            const headers = table.headers.map((cell, index) => {
                return renderTableCell("th", cell, table.alignments[index]);
            }).join("");
            const rows = table.rows.map((row) => {
                const cells = table.headers.map((header, index) => {
                    return renderTableCell("td", row[index] || "", table.alignments[index]);
                }).join("");

                return `<tr>${cells}</tr>`;
            }).join("");

            return `<div class="markdown-table-wrap">
                <table class="markdown-table">
                    <thead><tr>${headers}</tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }

        function renderTableCell(tag, content, alignment) {
            const className = alignment && alignment !== "left"
                ? ` class="markdown-table-cell-${alignment}"`
                : "";

            return `<${tag}${className}>${renderInline(content)}</${tag}>`;
        }

		function renderToc(toc) {
			const root = [];

			// Keep track of the latest heading at each level.
			const parents = {
				1: { children: root }
			};

			for (const item of toc) {
				const node = {
					...item,
					children: []
				};

				// Find the closest existing parent heading.
				let parent = null;

				for (let level = item.level - 1; level >= 1; level--) {
					if (parents[level]) {
						parent = parents[level];
						break;
					}
				}

				// If nothing exists, attach to root.
				if (!parent) {
					parent = { children: root };
				}

				parent.children.push(node);

				// Store this heading as the newest heading of its level.
				parents[item.level] = node;

				// Remove deeper headings because they no longer belong
				// to subsequent sections.
				for (const level of Object.keys(parents)) {
					if (Number(level) > item.level) {
						delete parents[level];
					}
				}
			}

			return `
				<ul class="toc-list">
					${renderTocItems(root)}
				</ul>
			`;
		}

		function renderTocItems(items) {
			return items
				.map((item) => `

						<a
							class="toc-link"
							href="#${item.id}"
							data-target="${item.id}"
						>
							${escapeHtml(item.text)}
						</a>

						${
							item.children.length
								? `
									<ul class="toc-sublist">
										${renderTocItems(item.children)}
									</ul>
								`
								: ""
						}
					</li>
				`)
				.join("");
		}

		function renderIcon(name) {

					aria-hidden="true"

				return `<span

			}
			
			if (name === "drives") {

					class="material-symbols-outlined icon-material"
					style="font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;"
					aria-hidden="true"

			if (name === "story") {
				return `<span
					class="material-symbols-outlined icon-material"
					aria-hidden="true"
				>import_contacts</span>`;

			return `<svg

				height="20"

				)

				// Inline code
				.replace(/`([^`]+)`/g, "<code>$1</code>")

				// Bold
				.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")

				// Italics
				.replace(/\*([^*]+)\*/g, "<em>$1</em>");
		}

        function renderLoadError(error, title) {
            document.title = `NAKAMA SRD — ${title}`;
            selectors.sourceBadge.textContent = `Check ${manifestPath}`;
            selectors.tocList.innerHTML = "";
            selectors.document.innerHTML = `<header class="doc-header" role="alert">
                <p class="doc-kicker">Configuration required</p>
                <h1 class="doc-title">${escapeHtml(title)}</h1>
                <p class="doc-description">
                    The SRD now uses ${escapeHtml(manifestPath)} as the
                    source of truth. Confirm the manifest exists beside
                    index.html and that every listed document path is
                    available.
                </p>
                <p class="doc-description">${escapeHtml(error.message || "Unknown loading error.")}</p>
            </header>`;
        }

		function setDocumentLoading(isLoading) {
			if (!isLoading) {
				return;
			}

			setSourceBadge("Loading document");

			selectors.document.innerHTML = `<div class="skeleton" aria-hidden="true">
				<div class="skeleton-line skeleton-line-short"></div>
				<div class="skeleton-line"></div>
				<div class="skeleton-card"></div>
				<div class="skeleton-line"></div>
				<div class="skeleton-line skeleton-line-short"></div>
			</div>`;
		}

        function setActiveNavigation(docId) {
            document.querySelectorAll("[data-doc-link]").forEach((link) => {
                link.classList.toggle("is-active", link.getAttribute("data-doc-link") === docId);
            });
        }

        function findDocument(docId) {
            return state.manifest.documents.find((doc) => doc.id === docId);
        }

        function toggleTheme() {
            const root = document.documentElement;
            const nextTheme = root.dataset.theme === "dark" ? "light" : "dark";

            root.dataset.theme = nextTheme;
            localStorage.setItem("nakama-theme", nextTheme);
            updateThemeLabel();
        }

        function applyStoredTheme() {
            const storedTheme = localStorage.getItem("nakama-theme");

            if (storedTheme === "light" || storedTheme === "dark") {
                document.documentElement.dataset.theme = storedTheme;
            }

            updateThemeLabel();
        }

        function updateThemeLabel() {
            const isDark = document.documentElement.dataset.theme === "dark";

            selectors.themeLabel.textContent = isDark ? "Dark mode" : "Light mode";
        }

        function applyStoredAccent() {
            const storedAccent = localStorage.getItem("nakama-accent");

            setAccent(storedAccent || defaultAccent);
        }

        function selectAccentPreset(event) {
            const value = event.currentTarget.getAttribute("data-accent-value");
            const label = event.currentTarget.getAttribute("data-accent-label");

            applyAccent(value);
            selectors.status.textContent = `${label} highlight applied.`;
        }

        function saveAccent() {
            const nextAccent = selectors.accentInput.value;

            selectors.saveAccent.classList.add("is-loading");
            selectors.status.textContent = "";

            setTimeout(() => {
                applyAccent(nextAccent);
                selectors.saveAccent.classList.remove("is-loading");
                selectors.status.textContent = "Custom highlight colour saved.";
            }, 400);
        }

        function resetAccent() {
            applyAccent(defaultAccent);
            selectors.status.textContent = "Highlight colour reset to orange.";
        }

        function applyAccent(value) {
            setAccent(value);
            localStorage.setItem("nakama-accent", value);
        }

        function setAccent(value) {
            if (!isHexColor(value)) {
                return;
            }

            document.documentElement.style.setProperty("--accent", value);
            document.documentElement.style.setProperty("--accent-hover", darkenHex(value));
            selectors.accentInput.value = value;
            updateAccentPresets(value);
        }

        function updateAccentPresets(value) {
            selectors.accentPresetButtons.forEach((button) => {
                const isActive = button.getAttribute("data-accent-value") === value;

                button.classList.toggle("is-active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        function isHexColor(value) {
            return /^#[0-9a-f]{6}$/i.test(value);
        }

        function darkenHex(value) {
            const channels = value
                .slice(1)
                .match(/.{2}/g)
                .map((channel) => parseInt(channel, 16));

            return `#${channels.map((channel) => {
                return Math.max(0, Math.round(channel * 0.86))
                    .toString(16)
                    .padStart(2, "0");
            }).join("")}`;
        }

        function toggleMenu() {
            const isOpen = selectors.controlPanel.classList.toggle("is-open");

            document.body.classList.toggle("is-controlpanel-open", isOpen);
            selectors.scrim.classList.toggle("is-open", isOpen);
            selectors.controlPanel.setAttribute("aria-hidden", String(!isOpen));
            selectors.menuToggle.setAttribute("aria-expanded", String(isOpen));
            selectors.menuToggle.setAttribute(
                "aria-label",
                isOpen ? "Close reference options" : "Open reference options"
            );
        }

        async function buildSearchIndex() {
            selectors.searchInput.placeholder = "Preparing search...";

            try {
                const indexedDocuments = await Promise.all(
                    state.manifest.documents.map(async (doc) => {
                        const markdown = await fetchMarkdown(doc.path);

                        return indexSearchDocument(markdown, doc);
                    })
                );

                state.searchIndex = indexedDocuments.flat();
                state.searchReady = true;
                selectors.searchInput.disabled = false;
                selectors.searchInput.placeholder = "Search sections, powers, interactions...";
            } catch (error) {
                selectors.searchInput.placeholder = "Search unavailable";
            }
        }

        function indexSearchDocument(markdown, doc) {
            const { meta, body } = splitFrontMatter(markdown);
            const lines = body.split(/\r?\n/);
            const entries = [];
            const docTitle = meta.title || doc.title || doc.label || "Document";
            const docSection = meta.section || doc.section || "System Reference";
            let pageHeader = docTitle;
            let currentSubheader = docTitle;
            let currentSection = "";
            let index = 0;

            while (index < lines.length) {
                const line = lines[index];

                if (!line.trim()) {
                    index += 1;
                    continue;
                }

                if (line.startsWith("#")) {
                    const heading = parseHeading(line);
                    const anchor = createSlug(heading.text);

                    if (heading.level === 1) {
                        pageHeader = heading.text;
                        currentSubheader = heading.text;
                        currentSection = "";
                    }

                    if (heading.level === 2) {
                        currentSubheader = heading.text;
                        currentSection = "";
                    }

                    if (heading.level === 3) {
                        currentSection = heading.text;
                    }

                    entries.push(createSearchEntry({
                        anchor,
                        body: "",
                        doc,
                        header: heading.text,
                        section: formatSearchSection(
                            docTitle,
                            docSection,
                            currentSubheader,
                            currentSection
                        ),
                        subheader: heading.level === 2 ? heading.text : currentSubheader
                    }));

                    index += 1;
                    continue;
                }

                if (line.startsWith(":::")) {
                    const block = collectBlock(lines, index);

                    if (block.type === "power") {
                        const title = block.attrs.title || "Power";
                        const key = block.attrs.key || "";
                        const text = stripMarkdown(block.content);
                        const section = formatSearchSection(
                            docTitle,
                            docSection,
                            currentSubheader,
                            currentSection,
                            key
                        );

                        entries.push(createSearchEntry({
                            anchor: createSlug(title),
                            body: text,
                            doc,
                            header: title,
                            section,
                            subheader: currentSubheader
                        }));
                    }

                    index = block.nextIndex;
                    continue;
                }

                if (line.startsWith("- ")) {
                    const list = collectList(lines, index);
                    const text = stripMarkdown(list.items.join(" "));

                    entries.push(createSearchEntry({
                        anchor: createSlug(currentSection || currentSubheader),
                        body: text,
                        doc,
                        header: currentSection || currentSubheader || pageHeader,
                        section: formatSearchSection(
                            docTitle,
                            docSection,
                            currentSubheader,
                            currentSection
                        ),
                        subheader: currentSubheader
                    }));

                    index = list.nextIndex;
                    continue;
                }

                if (isTableStart(lines, index)) {
                    const table = collectTable(lines, index);
                    const text = stripMarkdown([
                        table.headers.join(" "),
                        ...table.rows.map((row) => row.join(" "))
                    ].join(" "));

                    entries.push(createSearchEntry({
                        anchor: createSlug(currentSection || currentSubheader),
                        body: text,
                        doc,
                        header: currentSection || currentSubheader || pageHeader,
                        section: formatSearchSection(
                            docTitle,
                            docSection,
                            currentSubheader,
                            currentSection
                        ),
                        subheader: currentSubheader
                    }));

                    index = table.nextIndex;
                    continue;
                }

                const paragraph = collectParagraph(lines, index);
                const text = stripMarkdown(paragraph.text);

                entries.push(createSearchEntry({
                    anchor: createSlug(currentSection || currentSubheader),
                    body: text,
                    doc,
                    header: currentSection || currentSubheader || pageHeader,
                    section: formatSearchSection(
                        docTitle,
                        docSection,
                        currentSubheader,
                        currentSection
                    ),
                    subheader: currentSubheader
                }));

                index = paragraph.nextIndex;
            }

            return entries;
        }

		function createSearchEntry(entry) {
			const fields = {
				title: normaliseSearchText(entry.doc.title || entry.doc.label || ""),
				header: normaliseSearchText(entry.header),
				body: normaliseSearchText(entry.body),
				section: normaliseSearchText(entry.section),
				subheader: normaliseSearchText(entry.subheader)
			};

			let type = "body";

			if (!entry.body) {
				type = "heading";
			}

			if (
				fields.title &&
				fields.header === fields.title
			) {
				type = "page";
			}

			return {
				...entry,
				type,
				fields
			};
		}

        function updateSearchResults() {
            const query = selectors.searchInput.value.trim();

            if (!state.searchReady || query.length < 2) {
                closeSearchResults();
                return;
            }

            const results = getSearchResults(query);

            if (!results.length) {
                closeSearchResults();
                return;
            }

            selectors.searchResults.innerHTML = renderSearchResults(results, query);
            selectors.searchResults.hidden = false;
        }

		function getSearchResults(query) {

			const terms = normaliseSearchText(query)
				.split(" ")
				.filter(Boolean);

			const matches = state.searchIndex
				.filter((entry) => {

					return terms.every((term) => {

						return (
							entry.fields.title.includes(term) ||
							entry.fields.header.includes(term) ||
							entry.fields.body.includes(term) ||
							entry.fields.section.includes(term)
						);

					});

				})
				.map((entry) => {

					return {
						...entry,
						score: getSearchScore(entry, terms)
					};

				})
				.sort((a, b) => b.score - a.score);

			//
			// Remove duplicate destinations.
			//

			const seen = new Set();

			return matches.filter((entry) => {

				const key =
					`${entry.doc.id}:${entry.anchor}`;

				if (seen.has(key)) {
					return false;
				}

				seen.add(key);
				return true;

			}).slice(0, 24);
		}

		function getSearchScore(entry, terms) {
			let score = 0;

			for (const term of terms) {

				//
				// 1. Page title
				//
				if (
					entry.type === "page" &&
					entry.fields.title.includes(term)
				) {
					score += 1000;
					continue;
				}

				//
				// 2. Exact heading
				//
				if (
					entry.type === "heading" &&
					entry.fields.header === term
				) {
					score += 900;
					continue;
				}

				//
				// 3. Exact body
				//
				if (
					entry.type === "body" &&
					entry.fields.body === term
				) {
					score += 800;
					continue;
				}

				//
				// 4. Heading contains
				//
				if (
					entry.type === "heading" &&
					entry.fields.header.includes(term)
				) {
					score += 700;
					continue;
				}

				//
				// 5. Body contains
				//
				if (
					entry.type === "body" &&
					entry.fields.body.includes(term)
				) {
					score += 600;
					continue;
				}

				//
				// 6. Metadata
				//
				if (entry.fields.section.includes(term)) {
					score += 100;
				}
			}

			return score;
		}

        function renderSearchResults(results, query) {
            if (!results.length) {
                return `<p class="searchresults-empty">No matches for “${escapeHtml(query)}”.</p>`;
            }

            const groups = new Map();

            results.forEach((result) => {
                if (!groups.has(result.subheader)) {
                    groups.set(result.subheader, []);
                }

                groups.get(result.subheader).push(result);
            });

            return [...groups.entries()].map(([subheader, items]) => {
                return `<section class="searchgroup">
                    <h2 class="searchgroup-title">${escapeHtml(subheader)}</h2>
                    <ul class="searchresult-list">
                        ${items.map(renderSearchResult).join("")}
                    </ul>
                </section>`;
            }).join("");
        }

        function renderSearchResult(result) {
            const snippet = createSearchSnippet(result.body);

            return `<li>
                <a
                    class="searchresult"
                    href="#${escapeAttribute(result.doc.id)}"
                    data-search-doc="${escapeAttribute(result.doc.id)}"
                    data-search-anchor="${escapeAttribute(result.anchor)}"
                >
                    <span class="searchresult-title">${escapeHtml(result.header)}</span>
                    <span class="searchresult-section">${escapeHtml(result.section)}</span>
                    ${snippet ? `<span class="searchresult-snippet">${escapeHtml(snippet)}</span>` : ""}
                </a>
            </li>`;
        }

        async function selectSearchResult(event) {
            const link = event.target.closest("[data-search-doc]");

            if (!link) {
                return;
            }

            event.preventDefault();

            const docId = link.getAttribute("data-search-doc");
            const anchor = link.getAttribute("data-search-anchor");

            window.location.hash = docId;
            await loadDocument(docId);
            closeSearchResults();
            selectors.searchInput.value = "";

            requestAnimationFrame(() => {
                document.getElementById(anchor)?.scrollIntoView({
                    block: "start",
                    behavior: "smooth"
                });
            });
        }

        function handleSearchKeydown(event) {
            if (event.key === "Escape") {
                closeSearchResults();
                return;
            }

            if (event.key === "Enter") {
                const firstResult = selectors.searchResults.querySelector("[data-search-doc]");

                if (firstResult) {
                    firstResult.click();
                }
            }
        }

        function closeSearchResults() {
            selectors.searchResults.hidden = true;
            selectors.searchResults.innerHTML = "";
        }

        function createSearchSnippet(value) {
            const text = stripMarkdown(value).replace(/\s+/g, " ").trim();

            return text.length > 120 ? `${text.slice(0, 117)}...` : text;
        }

        function formatSearchSection(docTitle, docSection, subheader, section, key = "") {
            return [docTitle, docSection, subheader, section, key]
                .filter(Boolean)
                .filter((value, index, values) => values.indexOf(value) === index)
                .join(" · ");
        }

        function stripMarkdown(value) {
            return String(value)
                .replace(/`([^`]+)`/g, "$1")
                .replace(/\*\*([^*]+)\*\*/g, "$1")
                .replace(/\*([^*]+)\*/g, "$1")
                .replace(/#+\s*/g, "")
                .trim();
        }

        function normaliseSearchText(value) {
            return stripMarkdown(value).toLowerCase();
        }

        function closeMenu() {
            document.body.classList.remove("is-controlpanel-open");
            selectors.controlPanel.classList.remove("is-open");
            selectors.scrim.classList.remove("is-open");
            selectors.controlPanel.setAttribute("aria-hidden", "true");
            selectors.menuToggle.setAttribute("aria-expanded", "false");
            selectors.menuToggle.setAttribute("aria-label", "Open reference options");
        }

        function createSlug(value) {
            return value
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-|-$/g, "");
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replace(/`/g, "&#096;");
        }

        function delay(duration) {
            return new Promise((resolve) => {
                setTimeout(resolve, duration);
            });
        }

        init();
    </script>
</body>
</html>
