name: TOC Generator

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generateTOC:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build TOC target list
        run: |
          TARGET_PATHS=$(find . -type f -name '*.md' ! -path './README.md' | sed 's#^\./##' | paste -sd, -)
          echo "TARGET_PATHS=$TARGET_PATHS" >> "$GITHUB_ENV"

      - uses: technote-space/toc-generator@v4
        with:
          TARGET_PATHS: ${{ env.TARGET_PATHS }}
